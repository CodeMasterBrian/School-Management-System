{% extends "dash/base.html" %} {% load static %} {% block title %} Login {% endblock title %} {% block content %}
      <div class="main-wrapper login-body">
         <div class="login-wrapper">
            <div class="container">
               <div class="loginbox">
                  <div class="login-left">
                     <img class="img-fluid" src=" {% static "dash/img/logo-white.png" %}" alt="Logo">
                  </div>
                  <div class="login-right">
                     <div class="login-right-wrap">
                        <h1>Login</h1>
                        <p class="account-subtitle">Access to our dashboard</p>
                        <form action="{% url 'auth:login' %}" method="post">
                           {% csrf_token %}
                           <div class="form-group">
                              <label >Email address</label>
                              <input type="email" class="form-control" name="email" placeholder="Enter email">
                            </div>
                            <div class="form-group">
                              <label >Password</label>
                              <input type="password" class="form-control" name="pass1" placeholder="Enter Password">
                            </div>
                            <button type="submit" class="btn btn-primary">Login</button>
                        </form>
                        <div class="text-center forgotpass"><a href="#">Forgot Password?</a></div>
                        <div class="login-or">
                           <span class="or-line"></span>
                           <span class="span-or">or</span>
                        </div>
                        <div class="text-center dont-have">Don’t have an account? <a href="{% url "auth:register" %}">Register</a></div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      {% endblock content %}
