{% extends "dash/base.html" %} {% load static %} {% block title %} Register {% endblock title %} {% block content %}
<div class="main-wrapper login-body">
  <div class="login-wrapper">
    <div class="container">
      <div class="loginbox">
        <div class="login-left">
          <img class="img-fluid" src=" {% static "dash/img/logo-white.png" %}" alt="Logo" />
        </div>
        <div class="login-right">
          <div class="login-right-wrap">
            <h1>Register</h1>
            <p class="account-subtitle">Access to our dashboard</p>

            <form action="{% url 'auth:register' %}" method="post">
               {% csrf_token %}
               <div class="form-group">
                 <label >Username</label>
                 <input type="text" class="form-control" name="username"  placeholder="Enter username">
               </div>
               <div class="form-group">
                 <label >First name</label>
                 <input type="text" class="form-control" name="first_name"  placeholder="Enter first name">
               </div>
               <div class="form-group">
                 <label >Last name</label>
                 <input type="text" class="form-control" name="last_name"  placeholder="Enter last name">
               </div>
               <div class="form-group">
                 <label >Email address</label>
                 <input type="email" class="form-control" name="email" placeholder="Enter email">
               </div>
               <div class="form-group">
                 <label >Password</label>
                 <input type="password" class="form-control" name="pass1" placeholder="Password">
               </div>
               <div class="form-group">
                 <label >Confirm Password</label>
                 <input type="password" class="form-control" name="pass2" placeholder="Confirm Password">
               </div>
               <div class="form-check">
                 <input type="checkbox" class="form-check-input" >
                 <label class="form-check-label" >Agree to out <a href="#">Terms and Conditions"></a></label>
               </div>
               <button type="submit" class="btn btn-primary">Register</button>
             </form>
            <div class="text-center dont-have">
              Already have an account? <a href="{% url "auth:login" %}">Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
