{% load static %}
<!DOCTYPE html>
<html lang="en">
   
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
      <title>JAMTECH  - Dashboard</title>
      <link rel="shortcut icon" href=" {% static "dash/img/favicon.png" %} ">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap">
      <link rel="stylesheet" href=" {% static "dash/plugins/bootstrap/css/bootstrap.min.css" %} ">
      <link rel="stylesheet" href="{% static "dash/plugins/fontawesome/css/fontawesome.min.css" %}">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
      <link rel="stylesheet" href=" {% static "dash/plugins/fontawesome/css/all.min.css" %} a">
      <link rel="stylesheet" href=" {% static "dash/css/style.css" %} ">
   </head>
   <body>
      {% block content %}{% endblock content %}
      <script src=" {% static "dash/js/jquery-3.6.0.min.js" %} "></script>
      <script src=" {% static "dash/js/popper.min.js" %} "></script>
      <script src=" {% static "dash/plugins/bootstrap/js/bootstrap.min.js" %} "></script>
      <script src=" {% static "dash/plugins/slimscroll/jquery.slimscroll.min.js" %} "></script>
      <script src=" {% static "dash/plugins/apexchart/apexcharts.min.js" %} "></script>
      <script src=" {% static "dash/plugins/apexchart/chart-data.js" %} "></script>
      <script src=" {% static "dash/js/script.js" %} "></script>
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <script>
         {% for message in messages %}
      Swal.fire({
         title: "Success !",
         text: "{{message}}",
         icon: "success"
       });
       {% endfor %}
      </script>
   </body>
   
</html>
